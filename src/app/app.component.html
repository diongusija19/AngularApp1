<main class="dashboard">
  <header>
    <h1>User Profile Dashboard</h1>
    <p>Live component interaction demo with Angular standalone components.</p>
  </header>

  <section class="grid">
    <app-user-card [user]="user"></app-user-card>
    <app-user-status
      [isOnline]="user.isOnline"
      (statusChanged)="onStatusChanged($event)"
    ></app-user-status>
    <app-user-bio [bio]="user.bio" (bioSaved)="onBioSaved($event)"></app-user-bio>
  </section>
</main>
